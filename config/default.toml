# AIOS Default Configuration

[application]
name = "AIOS"
version = "0.1.0"
environment = "development"
debug = false

[server]
host = "0.0.0.0"
port = 8000

[cors]
origins = ["http://localhost:3000", "http://localhost:5173"]

[database]
path = "data/sqlite/aios.db"

[qdrant]
path = "data/qdrant"

[neo4j]
url = "bolt://localhost:7687"
user = "neo4j"
password = "aios12345"

[opensearch]
url = "http://localhost:9200"

[ollama]
url = "http://localhost:11434"
model = "llama3"

[openrouter]
base_url = "https://openrouter.ai/api/v1"

[logging]
level = "INFO"
format = "json"

[security]
jwt_algorithm = "HS256"
jwt_expiration_hours = 24

[indexing]
chunk_size = 1000
chunk_overlap = 200
embedding_model = "sentence-transformers/all-MiniLM-L6-v2"
score_threshold = 0.5
max_results = 20

[agents]
max_concurrent = 5
timeout_seconds = 300
retry_count = 3

[workflows]
max_parallel_tasks = 10
default_timeout = 600

[plugins]
directory = "plugins"
sandbox_enabled = true
auto_load = true
